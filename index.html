    <!-- JSON-LD Structured Schema Data (Tells Google exactly what the app is) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Unkahi",
        "url": "https://unkahi.space",
        "description": "Unkahi is a 100% private, interactive psychological safety space offering trauma-informed somatic healing tools and emergency helplines directly on your device.",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "All",
        "browserRequirements": "Requires JavaScript. Requires HTML5 Canvas.",
        "privacyPolicy": "https://unkahi.space/privacy"
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is somatic healing and how does it work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Somatic healing is a body-centered therapeutic approach focusing on the connection between the mind and body. Unlike traditional talk therapy, somatic healing addresses how stress and trauma are physically stored in the nervous system. By using tools like paced breathing, somatic release, and sensory grounding, it helps release physical tension and restore safety."
            }
          },
          {
            "@type": "Question",
            "name": "Is my data truly private and anonymous on Unkahi?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Unkahi uses a local-first, zero-knowledge architecture. All your mood logs, somatic assessment scores, and safety plans are stored entirely on-device. Your personal interactive sessions remain 100% private and offline."
            }
          },
          {
            "@type": "Question",
            "name": "What are the Fight, Flight, Freeze, and Fawn stress responses?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "These are the autonomic nervous system's threat responses. Fight/Flight mobilizes energy, leading to anxiety or hypervigilance. Freeze triggers a protective shutdown, causing numbness or dissociation. Fawn involves suppressing boundaries and people-pleasing to appease others and avoid conflict."
            }
          },
          {
            "@type": "Question",
            "name": "How does EMDR bilateral stimulation audio help in emotional regulation?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "EMDR bilateral stimulation uses alternating left-right audio tones to stimulate both hemispheres of the brain. This rhythmic stimulation helps tax working memory, reducing the emotional intensity of distressing thoughts and helping calm the nervous system."
            }
          },
          {
            "@type": "Question",
            "name": "Is Unkahi a replacement for professional therapy?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Unkahi is a self-paced, interactive grounding and emotional regulation tool. It is not a clinical therapy service or a crisis diagnostic platform. If you are experiencing a mental health emergency, please immediately access our Support Directory or contact a professional helpline like KIRAN (1800-599-0019)."
            }
          }
        ]
      }
    </script>
